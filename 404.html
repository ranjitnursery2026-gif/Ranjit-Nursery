<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Ranjit Nursery</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: { primary: '#2D5A27', accent: '#A66B29' },
                fontFamily: { outfit: ['Outfit', 'sans-serif'], inter: ['Inter', 'sans-serif'] }
            }
        }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 font-inter antialiased min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full text-center bg-white rounded-3xl p-8 md:p-12 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100">
        <div class="w-24 h-24 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-6">
            <i data-lucide="leafy-green" class="w-12 h-12 text-primary"></i>
        </div>
        
        <h1 class="text-7xl font-outfit font-extrabold text-primary mb-2">404</h1>
        <h2 class="text-2xl font-outfit font-bold text-gray-900 mb-4">Looks like you're lost!</h2>
        
        <p class="text-gray-500 mb-8">The page or plant you are looking for does not exist or has been moved.</p>
        
        <a href="/" class="inline-flex items-center justify-center gap-2 bg-primary hover:bg-emerald-800 text-white font-bold py-4 px-8 rounded-full transition-all shadow-lg hover:shadow-emerald-600/30 w-full md:w-auto">
            <i data-lucide="home" class="w-5 h-5"></i> Back to Homepage
        </a>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
