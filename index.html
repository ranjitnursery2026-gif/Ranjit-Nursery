<body class="antialiased bg-gray-50 text-gray-800 overflow-hidden">
  <!-- ================= PRELOADER ================= -->
  <style>
    @keyframes preloader-progress {
      0% {
        transform: scaleX(0);
      }

      100% {
        transform: scaleX(1);
      }
    }

    @keyframes slow-pan {
      0% {
        transform: scale(1.1) translate(0, 0);
      }

      100% {
        transform: scale(1) translate(-2%, -2%);
      }
    }

    .animate-preloader-progress {
      animation: preloader-progress 5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      transform-origin: left;
    }

    .animate-slow-pan {
      animation: slow-pan 10s ease-out forwards;
    }
  </style>
  <div id="app-preloader"

        alt="Premium Plants">
      <div class="absolute inset-0 bg-gradient-to-t md:bg-gradient-to-r from-emerald-950/90 to-transparent"></div>
      <div class="absolute bottom-6 left-6 md:bottom-12 md:left-12 text-white z-10">
        <h2 class="text-2xl md:text-4xl font-outfit font-extrabold mb-1 md:mb-2 text-white drop-shadow-lg">Ranjit
          Nursery</h2>
        <p class="text-emerald-200 text-sm md:text-lg font-medium drop-shadow-md">Cultivating Nature's Best Since 2010
        </p>
      </div>
    </div>

    <!-- Loading Section -->
    <div class="w-full md:w-1/2 h-3/5 md:h-full flex flex-col items-center justify-center bg-gray-50 p-8 relative">
      <div
        class="absolute inset-0 bg-[url('/images/neem_tree.png')] bg-no-repeat bg-right-bottom opacity-5 mix-blend-multiply">
      </div>
      <div class="relative flex flex-col items-center w-full max-w-sm z-10">
        <svg viewBox="0 0 450 100" class="h-20 md:h-28 w-auto mb-10 drop-shadow-xl overflow-visible"
          xmlns="http://www.w3.org/2000/svg">
          <style>
            .draw-text {
              fill: transparent;
              stroke: #047857;
              /* Emerald 700 */
              stroke-width: 1.5;
              stroke-dasharray: 600;
              stroke-dashoffset: 600;
              animation: draw 2s ease-in-out forwards, fill-text 1s 2s forwards;
            }

            .draw-leaf {
              fill: transparent;
              stroke: #10B981;
              /* Emerald 500 */
              stroke-width: 2;
              stroke-linecap: round;
              stroke-linejoin: round;
              stroke-dasharray: 300;
              stroke-dashoffset: 300;
              animation: draw 1.5s ease-in-out forwards, fill-leaf 1s 1.5s forwards;
            }

            @keyframes draw {
              to {
                stroke-dashoffset: 0;
              }
            }

            @keyframes fill-text {
              to {
                fill: #064E3B;
                stroke: transparent;
              }

              /* Emerald 900 */
            }

            @keyframes fill-leaf {
              to {
                fill: #10B981;
                stroke: transparent;
              }
            }
          </style>

          <!-- Animated Leaf Icon -->
          <path class="draw-leaf"
            d="M30 85 C10 85 5 50 15 30 C30 10 65 15 75 40 C85 70 30 85 30 85 Z M15 30 Q45 50 75 40" />

          <!-- Animated Text -->
          <text x="95" y="68" font-family="'Outfit', sans-serif" font-weight="900" font-size="52"
            class="draw-text">Ranjit Nursery</text>
        </svg>

        <div class="w-full bg-gray-200 rounded-full h-2 mb-6 overflow-hidden shadow-inner">

        <div class="h-6 overflow-hidden relative w-full text-center">

            the greenest plants...</div>
        </div>
      </div>
    </div>
  </div>



  <!-- Dynamic View Container -->
  <div id="dynamic-view-container"></div>

  <script>
    // Dynamically load Mobile or Desktop view
    async function loadView() {
      const isMobile = window.innerWidth < 768;
      const viewUrl = isMobile ? '/views/indexMob.html' : '/views/indexWeb.html';

      try {
        const response = await fetch(viewUrl);
        const html = await response.text();
        document.getElementById('dynamic-view-container').innerHTML = html;

        // Dispatch event so main.js knows the DOM is ready
        window.__viewLoadedFlag = true;
        window.dispatchEvent(new Event('view-loaded'));
      } catch (err) {
        console.error("Failed to load view", err);
      }
    }

    loadView();
  </script>
  <script>
    window.openModal = function (id) {
      const modal = document.getElementById(id);
      if (!modal) return;
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        modal.classList.add('opacity-100');
        if (id === 'search-modal') {
          const input = document.getElementById('global-search-input');
          if (input) input.focus();
        }
      }, 10);
    };

    window.closeModal = function (id) {
      const modal = document.getElementById(id);
      if (!modal) return;
      modal.classList.remove('opacity-100');
      modal.classList.add('opacity-0');
      setTimeout(() => {
        modal.classList.add('hidden');
        if (id === 'search-modal') {
          const input = document.getElementById('global-search-input');
          const results = document.getElementById('global-search-results');
          if (input) input.value = '';
          if (results) results.innerHTML = '<div class="text-center text-gray-400 py-10">Start typing to search our catalogue...</div>';
        }
      }, 300);
    };
  </script>

  <script type="module" src="/main.js"></script>
