<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranjit Nursery | 5 Star Nursery Wholesale</title>
  <meta name="description"
    content="Jai Jagannath | Your Green Partner for Premium Plants & Landscaping in Rourkela, Odisha. Wholesale & Retail Supplier." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Vite Main Stylesheet entry point is main.js, which imports style.css -->
</head>

<body class="antialiased bg-gray-50 text-gray-800 overflow-x-hidden">
  <!-- ================= PRELOADER ================= -->
  <style>
    @keyframes preloader-progress { 0% { transform: scaleX(0); } 100% { transform: scaleX(1); } }
    @keyframes slow-pan { 0% { transform: scale(1.1) translate(0, 0); } 100% { transform: scale(1) translate(-2%, -2%); } }
    .animate-preloader-progress { animation: preloader-progress 5s cubic-bezier(0.4, 0, 0.2, 1) forwards; transform-origin: left; }
    .animate-slow-pan { animation: slow-pan 10s ease-out forwards; }
  </style>
  <div id="app-preloader" class="fixed inset-0 z-[9999] bg-white flex flex-col md:flex-row transition-opacity duration-700">
    <!-- Image Section -->
    <div class="w-full md:w-1/2 h-2/5 md:h-full relative overflow-hidden">
      <img src="/images/hero_plants_new.png" class="absolute inset-0 w-full h-full object-cover animate-slow-pan" alt="Premium Plants">
      <div class="absolute inset-0 bg-gradient-to-t md:bg-gradient-to-r from-emerald-950/90 to-transparent"></div>
      <div class="absolute bottom-6 left-6 md:bottom-12 md:left-12 text-white z-10">
        <h2 class="text-2xl md:text-4xl font-outfit font-extrabold mb-1 md:mb-2 drop-shadow-lg">Ranjit Nursery</h2>
        <p class="text-emerald-200 text-sm md:text-lg font-medium drop-shadow-md">Cultivating Nature's Best Since 2026</p>
      </div>
    </div>
    
    <!-- Loading Section -->
    <div class="w-full md:w-1/2 h-3/5 md:h-full flex flex-col items-center justify-center bg-gray-50 p-8 relative">
      <div class="absolute inset-0 bg-[url('/images/neem_tree.png')] bg-no-repeat bg-right-bottom opacity-5 mix-blend-multiply"></div>
      <div class="relative flex flex-col items-center w-full max-w-sm z-10">
        <img src="/logo.png" alt="Ranjit Nursery Logo" class="h-24 md:h-32 w-auto object-contain relative mb-12 drop-shadow-xl animate-pulse" style="animation-duration: 3s;">
        
        <div class="w-full bg-gray-200 rounded-full h-2 mb-6 overflow-hidden shadow-inner">
          <div class="bg-gradient-to-r from-emerald-400 to-primary h-full rounded-full animate-preloader-progress shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
        </div>
        
        <div class="h-6 overflow-hidden relative w-full text-center">
            <div id="preloader-message" class="text-sm font-bold text-gray-500 uppercase tracking-widest transition-opacity duration-300">Curating the greenest plants...</div>
        </div>
      </div>
    </div>
  </div>

  
  
  <!-- Dynamic View Container -->
  <div id="dynamic-view-container"></div>

  <script>
    // Dynamically load Mobile or Desktop view
    async function loadView() {
      const isMobile = window.innerWidth < 768;
      const viewUrl = isMobile ? '/views/indexMob.html' : '/views/indexWeb.html';
      
      try {
        const response = await fetch(viewUrl);
        const html = await response.text();
        document.getElementById('dynamic-view-container').innerHTML = html;
        
        // Dispatch event so main.js knows the DOM is ready
        window.dispatchEvent(new Event('view-loaded'));
      } catch (err) {
        console.error("Failed to load view", err);
      }
    }
    
    loadView();
    // Handle resize swapping (optional, but good for dev)
    let lastIsMobile = window.innerWidth < 768;
    window.addEventListener('resize', () => {
        const isMobile = window.innerWidth < 768;
        if (isMobile !== lastIsMobile) {
            lastIsMobile = isMobile;
            loadView(); // Reload the other view
        }
    });
  </script>
<script>
    window.openModal = function(id) {
      const modal = document.getElementById(id);
      if (!modal) return;
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        modal.classList.add('opacity-100');
        if (id === 'search-modal') {
          const input = document.getElementById('global-search-input');
          if(input) input.focus();
        }
      }, 10);
    };

    window.closeModal = function(id) {
      const modal = document.getElementById(id);
      if (!modal) return;
      modal.classList.remove('opacity-100');
      modal.classList.add('opacity-0');
      setTimeout(() => {
        modal.classList.add('hidden');
        if (id === 'search-modal') {
          const input = document.getElementById('global-search-input');
          const results = document.getElementById('global-search-results');
          if(input) input.value = '';
          if(results) results.innerHTML = '<div class="text-center text-gray-400 py-10">Start typing to search our catalogue...</div>';
        }
      }, 300);
    };
  </script>

</body>

</html>
